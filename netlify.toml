# Dashboard blog compatibility mirror routes
[[redirects]]
  from = "/dashboard/blog/*"
  to = "/blog/:splat"
  status = 301

# Redirect /dashboard to the dashboard subdomain
[[redirects]]
  from = "/dashboard"
  to = "https://dashboard.a-gent.co/"
  status = 301

# Signup page
[[redirects]]
  from = "/signup"
  to = "/signup.html"
  status = 200

# Modules page (pretty URL -> file)
[[redirects]]
  from = "/modules"
  to = "/modules.html"
  status = 200
