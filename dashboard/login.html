<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — A-Gent Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0f;
      color: #f0f0f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem;
    }
    
    .emblem {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #c9a227, #8b6914);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
    }
    
    h1 {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }
    
    .tagline {
      text-align: center;
      color: #888;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    
    .form-card {
      background: #16161f;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 2rem;
    }
    
    .form-group {
      margin-bottom: 1.25rem;
    }
    
    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      color: #888;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      background: #0a0a0f;
      color: #f0f0f5;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    
    input:focus {
      border-color: #c9a227;
    }
    
    input::placeholder {
      color: #555;
    }
    
    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, #c9a227 0%, #8b6914 100%);
      border: none;
      border-radius: 8px;
      color: #0a0a0f;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }
    
    .submit-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(201,162,39,0.4);
    }
    
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .error-msg {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      padding: 0.875rem;
      color: #ef4444;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      display: none;
    }
    
    .error-msg.show {
      display: block;
    }
    
    .hint {
      text-align: center;
      font-size: 0.7rem;
      color: #555;
      margin-top: 1.5rem;
    }
    
    .signup-link {
      text-align: center;
      font-size: 0.8rem;
      color: #888;
      margin-top: 1rem;
    }
    
    .signup-link a {
      color: #c9a227;
      text-decoration: none;
    }
    
    .signup-link a:hover {
      text-decoration: underline;
    }
  </style>
  <link rel="stylesheet" href="assets/css/brand-system.css">
</head>
<body>
  <div class="login-container">
    <div class="emblem"><img class="login-brand-icon" src="assets/brand/a-gent-icon.png" alt="A-Gent"></div>
    <h1>A-Gent Dashboard</h1>
    <p class="tagline">Sign in to access your dashboard</p>
    
    <div class="form-card">
      <div class="error-msg" id="errorMsg">Incorrect email or password. Please try again.</div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="sarah@acmecorp.com" required autofocus>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter password" required>
        </div>
        
        <button type="submit" class="submit-btn" id="submitBtn">Sign In</button>
      </form>
      
      <p class="signup-link">Don't have an account? <a href="/signup.html">Sign up free</a></p>
    </div>
  </div>
  
  <script>
    const API_BASE = window.location.hostname === 'localhost' 
      ? 'http://localhost:3000' 
      : 'https://api.a-gent.co';
    
    const SESSION_KEY = 'agent_session';
    const SESSION_DURATION = 7 * 24 * 60 * 60 * 1000; // 7 days
    
    // Check if already signed in
    function checkSession() {
      const session = localStorage.getItem(SESSION_KEY);
      if (session) {
        const { token, expiry } = JSON.parse(session);
        if (Date.now() < expiry) {
          window.location.href = 'index.html';
          return;
        }
      }
    }
    
    // Set loading state
    function setLoading(loading) {
      const btn = document.getElementById('submitBtn');
      const errorEl = document.getElementById('errorMsg');
      btn.disabled = loading;
      btn.textContent = loading ? 'Signing in...' : 'Sign In';
      errorEl.classList.remove('show');
    }
    
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      setLoading(true);
      
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMsg');
      
      try {
        const resp = await fetch(API_BASE + '/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        
        const result = await resp.json();
        
        if (!resp.ok) {
          throw new Error(result.error || 'Login failed');
        }
        
        // Store session
        const session = {
          token: result.token,
          user: result.user,
          expiry: Date.now() + SESSION_DURATION,
        };
        localStorage.setItem(SESSION_KEY, JSON.stringify(session));
        
        // Redirect to dashboard
        window.location.href = 'index.html';
        
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.classList.add('show');
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      } finally {
        setLoading(false);
      }
    });
    
    checkSession();
  </script>
</body>
</html>
